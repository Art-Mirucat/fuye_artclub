<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>覆野画社 - 首页</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/images/favicon.webp" type="image/svg+xml"> 
</head>
<body>
    <!-- 加载遮罩层 -->
    <div id="loadingScreen" class="loading-screen">
        <img class="loading-banner" src="assets/images/ui/loading.webp" alt="加载中">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在加载...</p>
    </div>

    <header>
        <nav>
            <div class="logo">◀覆野画社▶</div>
            <button class="hamburger-menu" id="hamburgerMenu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="rules.html">规则页</a></li>
                <li><a href="members.html">社员页</a></li>
                <li><a href="announcements.html">公告页</a></li>
                <li><a href="contact.html">联系页</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" style="text-align: center; padding: 100px 20px;">
            <h1 style="font-size: 3rem; margin-bottom: 20px;">覆野画社</h1>
            <p style="font-size: 1.2rem; color: var(--text-light); max-width: 600px; margin: 0 auto 40px;">
                欢迎来到覆野画社，致力让每一位单主在这里找到心仪的白菜稿件！
            </p>
            <div class="maple-decoration" style="font-size: 3rem; color: var(--accent);">🍁</div>
            <br>
            <a href="members.html" class="btn btn-primary" style="font-size: 1.2rem; padding: 12px 30px; text-decoration: none;">浏览社员</a>
        </section>

        <section class="container">
            <div class="home-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
                <div class="card" style="background: white; padding: 30px; border-radius: 8px; box-shadow: var(--shadow); text-align: center;">
                    <h3 style="color: var(--primary);">社团规则</h3>
                    <p>了解我们的运作方式和社员守则。</p>
                    <a href="rules.html" style="color: var(--accent); margin-top: 10px; display: inline-block;">查看详情 &rarr;</a>
                </div>
                <div class="card" style="background: white; padding: 30px; border-radius: 8px; box-shadow: var(--shadow); text-align: center;">
                    <h3 style="color: var(--primary);">加入我们</h3>
                    <p>寻找志同道合的伙伴，共同创作。</p>
                    <a href="contact.html" style="color: var(--accent); margin-top: 10px; display: inline-block;">联系方式 &rarr;</a>
                </div>
                <div class="card" style="background: white; padding: 30px; border-radius: 8px; box-shadow: var(--shadow); text-align: center;">
                    <h3 style="color: var(--primary);">最新公告</h3>
                    <p>关注画社的最新动态和活动。</p>
                    <a href="announcements.html" style="color: var(--accent); margin-top: 10px; display: inline-block;">查看公告 &rarr;</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 覆野画社 ‖ 制作：咪噜喵MiruCat.</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
